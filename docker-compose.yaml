services:
  bookShop-postgres:
    image: postgres:18.1-bookworm
    container_name: bookShop-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always
  
  bookShop-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations
  
  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: bookShop-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:bookShop-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"
  
  minio:
    image: minio/minio
    container_name: bookShop-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ${PROJECT_ROOT}/out/minio:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"